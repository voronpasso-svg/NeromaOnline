<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neroma | Secure Assistant</title>
</head>
<body>
    <div id="auth-section">
        <input type="password" id="masterPassword" placeholder="Мастер-пароль">
        <button onclick="unlock()">Войти</button>
    </div>

    <div id="app-section" style="display:none;">
        <input type="text" id="noteInput" placeholder="Введите заметку...">
        <button onclick="saveNote()">Сохранить</button>
        <button onclick="logout()">Выйти</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsbFRT6qv_S_UcgrUQn6dCnJqiYTpLuh8",
            authDomain: "neroma-data.firebaseapp.com",
            projectId: "neroma-data",
            storageBucket: "neroma-data.firebasestorage.app",
            messagingSenderId: "664569197862",
            appId: "1:664569197862:web:f78152be076d2c0e0fbde7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция входа
        window.unlock = () => {
            const pass = document.getElementById('masterPassword').value;
            if(pass) {
                sessionStorage.setItem('masterPassword', pass);
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                console.log("Вход выполнен");
            }
        };

        // Функция сохранения
        window.saveNote = async () => {
            const text = document.getElementById('noteInput').value;
            const pass = sessionStorage.getItem('masterPassword');
            
            if(!pass) { alert("Сначала войдите!"); return; }

            try {
                await addDoc(collection(db, "notes"), { 
                    content: text, 
                    timestamp: new Date() 
                });
                document.getElementById('noteInput').value = '';
                alert("Заметка сохранена в базу!");
            } catch (e) {
                console.error("Ошибка сохранения: ", e);
                alert("Ошибка! Проверьте консоль.");
            }
        };

        window.logout = () => {
            sessionStorage.removeItem('masterPassword');
            location.reload();
        };

        // Автоматический вход при обновлении
        window.onload = () => {
            if (sessionStorage.getItem('masterPassword')) {
                unlock();
            }
        };
    </script>
</body>
</html>
