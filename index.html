<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neroma | Secure Assistant</title>
</head>
<body>
    <div id="auth-section">
        <input type="password" id="masterPassword" placeholder="Пароль">
        <button onclick="unlock()">Войти</button>
    </div>
    <div id="app-section" style="display:none;">
        <input type="text" id="noteInput" placeholder="Заметка...">
        <button onclick="saveNote()">Сохранить</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsbFRT6qv_S_UcgrUQn6dCnJqiYTpLuh8",
            authDomain: "neroma-data.firebaseapp.com",
            projectId: "neroma-data",
            storageBucket: "neroma-data.firebasestorage.app",
            messagingSenderId: "664569197862",
            appId: "1:664569197862:web:f78152be076d2c0e0fbde7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Шифрование
        window.encrypt = (text, password) => btoa(text + ":" + password);

        // Логика сессии
        window.unlock = () => {
            const pass = document.getElementById('masterPassword').value;
            if(pass) {
                sessionStorage.setItem('masterPassword', pass);
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
            }
        };

        window.saveNote = async () => {
            const text = document.getElementById('noteInput').value;
            const pass = sessionStorage.getItem('masterPassword');
            await addDoc(collection(db, "notes"), { 
                content: window.encrypt(text, pass), 
                timestamp: new Date() 
            });
            alert("Заметка сохранена!");
        };

        window.onload = () => {
            if (sessionStorage.getItem('masterPassword')) {
                document.getElementById('masterPassword').value = sessionStorage.getItem('masterPassword');
                unlock();
            }
        };
    </script>
</body>
</html>
